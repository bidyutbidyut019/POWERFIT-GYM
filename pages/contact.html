<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta 
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta 
        name="description"
        content="Contact POWERFIT GYM"
    >

    <title>
        Contact | POWERFIT GYM
    </title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css">

    <link rel="stylesheet" href="../css/responsive.css">

    <!-- Favicon -->
    <link 
        rel="icon"
        type="image/png"
        href="../public/images/logo.png"
    >

</head>

<body>

    <!-- NAVBAR COMPONENT -->
    <div id="navbar"></div>

    <!-- PAGE HEADER -->
    <section class="page-header">

        <div class="container">

            <h1>
                Contact POWERFIT GYM
            </h1>

            <p>
                Have questions? Contact our team today.
            </p>

        </div>

    </section>

    <!-- CONTACT SECTION -->
    <section class="contact">

        <div class="container">

            <div class="contact-content">

                <!-- CONTACT INFO -->
                <div class="contact-info">

                    <h2>
                        Get In Touch
                    </h2>

                    <div class="info-item">

                        <h4>📍 Address</h4>

                        <p>
                            123 Fitness Street,
                            Gym City, USA
                        </p>

                    </div>

                    <div class="info-item">

                        <h4>📞 Phone</h4>

                        <p>
                            +1 234 567 890
                        </p>

                    </div>

                    <div class="info-item">

                        <h4>✉️ Email</h4>

                        <p>
                            info@powerfitgym.com
                        </p>

                    </div>

                    <div class="info-item">

                        <h4>⏰ Opening Hours</h4>

                        <p>
                            Monday - Sunday:
                            6 AM - 11 PM
                        </p>

                    </div>

                </div>

                <!-- CONTACT FORM -->
                <form class="contact-form">

                    <h2>
                        Send Message
                    </h2>

                    <!-- NAME -->
                    <div class="form-group">

                        <label for="name">
                            Full Name
                        </label>

                        <input 
                            type="text"
                            id="name"
                            placeholder="Enter your full name"
                            required
                        >

                    </div>

                    <!-- EMAIL -->
                    <div class="form-group">

                        <label for="email">
                            Email Address
                        </label>

                        <input 
                            type="email"
                            id="email"
                            placeholder="Enter your email"
                            required
                        >

                    </div>

                    <!-- MESSAGE -->
                    <div class="form-group">

                        <label for="message">
                            Message
                        </label>

                        <textarea 
                            id="message"
                            rows="5"
                            placeholder="Write your message"
                            required
                        ></textarea>

                    </div>

                    <!-- BUTTON -->
                    <button 
                        type="submit"
                        class="btn btn-primary"
                    >

                        Send Message

                    </button>

                </form>

            </div>

        </div>

    </section>

    <!-- FOOTER COMPONENT -->
    <div id="footer"></div>

    <!-- JS -->
    <script src="../js/main.js"></script>
<script src="../js/auth.js"></script>
</body>

</html>
